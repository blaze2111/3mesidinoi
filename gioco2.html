<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gioco 2 — Wordle del Cuore 🤍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lilla-deep: #7B5EA7;
      --lilla-mid: #9B7EC8;
      --lilla-light: #C3A8E0;
      --lilla-pale: #EDE0F7;
      --lilla-bg: #F5EEFF;
      --white: #FFFFFF;
      --text-dark: #3D2B5E;
      --text-mid: #6B4E8A;
      --shadow: rgba(123, 94, 167, 0.2);

      --green:  #538D4E;
      --yellow: #B59F3B;
      --gray:   #3A3A3C;
      --tile-empty: #ffffff;
      --tile-border-empty: #d3bfee;
      --tile-border-filled: #9B7EC8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--lilla-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.5rem; background: var(--white);
      box-shadow: 0 2px 16px var(--shadow);
      flex-shrink: 0;
    }
    nav a { font-size: 0.85rem; color: var(--lilla-mid); text-decoration: none; font-weight: 600; }
    nav a:hover { color: var(--lilla-deep); }
    .nav-badge {
      background: linear-gradient(135deg, var(--lilla-mid), var(--lilla-deep));
      color: white; border-radius: 999px; padding: 0.2rem 0.8rem;
      font-size: 0.75rem; font-weight: 700;
    }

    /* ── Header ── */
    .game-header {
      text-align: center;
      padding: 1.4rem 1.5rem 0.6rem;
    }
    .eyebrow {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--lilla-mid); margin-bottom: 0.4rem;
    }
    .game-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--text-dark);
    }
    .game-header h1 em { font-style: italic; color: var(--lilla-deep); }
    .game-header p {
      margin-top: 0.3rem; font-size: 0.85rem;
      color: var(--text-mid); line-height: 1.5;
    }

    /* ── Toast messaggio ── */
    #toast {
      position: fixed;
      top: 80px; left: 50%; transform: translateX(-50%);
      background: var(--text-dark);
      color: white;
      padding: 0.65rem 1.4rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── Griglia ── */
    #board-wrap {
      display: flex;
      justify-content: center;
      padding: 0.8rem 1rem;
    }
    #board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
    }
    .tile {
      width: clamp(44px, 13vw, 58px);
      height: clamp(44px, 13vw, 58px);
      border: 2px solid var(--tile-border-empty);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-dark);
      background: var(--tile-empty);
      transition: border-color 0.1s;
      position: relative;
      user-select: none;
    }
    /* lettera inserita ma non ancora confermata */
    .tile.filled {
      border-color: var(--tile-border-filled);
      animation: pop 0.1s ease;
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* rivelazione con flip */
    .tile.reveal {
      animation: flip 0.5s ease forwards;
    }
    @keyframes flip {
      0%   { transform: rotateX(0deg); }
      49%  { transform: rotateX(-90deg); }
      50%  { transform: rotateX(-90deg); background: var(--flip-color); border-color: var(--flip-color); color: white; }
      100% { transform: rotateX(0deg);  background: var(--flip-color); border-color: var(--flip-color); color: white; }
    }

    /* stati finali */
    .tile.correct  { background: var(--green);  border-color: var(--green);  color: white; }
    .tile.present  { background: var(--yellow); border-color: var(--yellow); color: white; }
    .tile.absent   { background: var(--gray);   border-color: var(--gray);   color: white; }

    /* shake riga sbagliata */
    .row.shake {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    /* bounce riga vinta */
    .tile.bounce {
      animation: bounce 0.6s ease forwards;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-20px); }
      60%     { transform: translateY(-10px); }
    }

    /* ── Tastiera ── */
    #keyboard {
      padding: 0 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }
    .kb-row {
      display: flex;
      gap: 5px;
      justify-content: center;
    }
    .key {
      height: clamp(50px, 12vw, 58px);
      min-width: clamp(28px, 8vw, 40px);
      padding: 0 0.3rem;
      border-radius: 6px;
      border: none;
      background: var(--lilla-light);
      color: var(--text-dark);
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.72rem, 2.5vw, 0.9rem);
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .key.wide { min-width: clamp(48px, 12vw, 64px); font-size: clamp(0.6rem, 2vw, 0.75rem); }
    .key:active { opacity: 0.8; }

    .key.correct { background: var(--green);  color: white; }
    .key.present { background: var(--yellow); color: white; }
    .key.absent  { background: var(--gray);   color: white; }

    /* ── Pannello risultato ── */
    #result-panel {
      display: none;
      max-width: 380px;
      margin: 0.5rem auto 1rem;
      padding: 0 1.2rem;
      text-align: center;
    }
    #result-panel.show { display: block; }
    .result-box {
      background: var(--white);
      border-radius: 18px;
      padding: 1.6rem 1.4rem;
      box-shadow: 0 4px 24px var(--shadow);
      border: 2px solid var(--lilla-pale);
    }
    .result-box .big { font-size: 2.2rem; margin-bottom: 0.4rem; }
    .result-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--text-dark); margin-bottom: 0.3rem;
    }
    .result-box p { font-size: 0.88rem; color: var(--text-mid); line-height: 1.55; margin-bottom: 1rem; }
    .word-reveal {
      display: inline-block;
      background: var(--lilla-pale);
      border-radius: 10px;
      padding: 0.4rem 1.2rem;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--lilla-deep);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }
    .btn-row { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: linear-gradient(135deg, var(--lilla-mid), var(--lilla-deep));
      color: white; border: none; border-radius: 999px;
      padding: 0.75rem 1.6rem; font-family: 'Nunito', sans-serif;
      font-size: 0.92rem; font-weight: 700; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(123,94,167,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--white); border: 2px solid var(--lilla-light);
      border-radius: 999px; padding: 0.7rem 1.4rem;
      font-family: 'Nunito', sans-serif; font-size: 0.92rem; font-weight: 700;
      color: var(--lilla-deep); cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: var(--lilla-pale); }
  </style>
</head>
<body>

<nav>
  <a href="index.html">← Torna alla mappa</a>
  <span style="flex:1"></span>
  <span class="nav-badge">🟩 Gioco 2 di 4</span>
</nav>

<div class="game-header">
  <p class="eyebrow">✦ Gioco 2 ✦</p>
  <h1>Wordle<br><em>del Cuore</em></h1>
  <p>Indovina la parola di 6 lettere in 6 tentativi 🤍<br>
     🟩 posto giusto &nbsp;·&nbsp; 🟨 lettera c'è, posto sbagliato &nbsp;·&nbsp; ⬜ lettera assente</p>
</div>

<div id="toast"></div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="result-panel">
  <div class="result-box">
    <div class="big" id="result-emoji">🎉</div>
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <div class="word-reveal" id="word-reveal"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="markDone()">Torna alla mappa 🤍</button>
      <button class="btn-secondary" onclick="resetGame()">🔄 Riprova</button>
    </div>
  </div>
</div>

<div id="keyboard"></div>

<script>
// ══════════════════════════════════════════
//  CONFIGURAZIONE
// ══════════════════════════════════════════
const SECRET = 'SENECA';   // parola segreta (uppercase)
const WORD_LEN = SECRET.length; // 6
const MAX_TRIES = 6;
// ══════════════════════════════════════════

const KEYBOARD_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['INVIO','Z','X','C','V','B','N','M','⌫']
];

let currentRow = 0;
let currentCol = 0;
let currentGuess = [];
let gameOver = false;
let tileEls = []; // tileEls[row][col]
let keyEls = {};  // keyEls['A'] = button element

// ── Build board ──
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  tileEls = [];
  for (let r = 0; r < MAX_TRIES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-' + r;
    const rowTiles = [];
    for (let c = 0; c < WORD_LEN; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
      rowTiles.push(tile);
    }
    board.appendChild(row);
    tileEls.push(rowTiles);
  }
}

// ── Build keyboard ──
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  keyEls = {};
  KEYBOARD_ROWS.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'kb-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.key = k;
      btn.addEventListener('click', () => handleKey(k));
      row.appendChild(btn);
      if (k.length === 1) keyEls[k] = btn;
    });
    kb.appendChild(row);
  });
}

// ── Input ──
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.key === 'Enter') { handleKey('INVIO'); return; }
  if (e.key === 'Backspace') { handleKey('⌫'); return; }
  const letter = e.key.toUpperCase();
  if (/^[A-Z]$/.test(letter)) handleKey(letter);
});

function handleKey(key) {
  if (gameOver) return;

  if (key === '⌫') {
    deleteLetter();
  } else if (key === 'INVIO') {
    submitGuess();
  } else if (/^[A-Z]$/.test(key) && currentCol < WORD_LEN) {
    addLetter(key);
  }
}

function addLetter(letter) {
  if (currentCol >= WORD_LEN) return;
  const tile = tileEls[currentRow][currentCol];
  tile.textContent = letter;
  tile.classList.add('filled');
  currentGuess.push(letter);
  currentCol++;
}

function deleteLetter() {
  if (currentCol === 0) return;
  currentCol--;
  currentGuess.pop();
  const tile = tileEls[currentRow][currentCol];
  tile.textContent = '';
  tile.classList.remove('filled');
}

// ── Calcolo risultato (gestisce lettere duplicate correttamente) ──
function evaluateGuess(guess) {
  // result: 'correct' | 'present' | 'absent'
  const result = Array(WORD_LEN).fill('absent');
  const secretArr = SECRET.split('');
  const guessArr  = guess.split('');

  // Primo passaggio: segna i verdi (correct)
  const secretUsed = Array(WORD_LEN).fill(false);
  const guessUsed  = Array(WORD_LEN).fill(false);
  for (let i = 0; i < WORD_LEN; i++) {
    if (guessArr[i] === secretArr[i]) {
      result[i] = 'correct';
      secretUsed[i] = true;
      guessUsed[i]  = true;
    }
  }

  // Secondo passaggio: segna i gialli (present)
  for (let i = 0; i < WORD_LEN; i++) {
    if (guessUsed[i]) continue;
    for (let j = 0; j < WORD_LEN; j++) {
      if (secretUsed[j]) continue;
      if (guessArr[i] === secretArr[j]) {
        result[i] = 'present';
        secretUsed[j] = true;
        break;
      }
    }
  }

  return result;
}

// ── Submit ──
function submitGuess() {
  if (currentCol < WORD_LEN) {
    shakeRow(currentRow);
    showToast('Parola troppo corta!');
    return;
  }

  const guess = currentGuess.join('');
  const result = evaluateGuess(guess);

  revealRow(currentRow, guess, result, () => {
    // Aggiorna tastiera
    updateKeyboard(guess, result);

    const won = result.every(r => r === 'correct');
    if (won) {
      bounceRow(currentRow);
      setTimeout(() => showResult(true, currentRow + 1), 400);
      gameOver = true;
      localStorage.setItem('game2_done', 'true');
    } else if (currentRow === MAX_TRIES - 1) {
      setTimeout(() => showResult(false), 300);
      gameOver = true;
    } else {
      currentRow++;
      currentCol = 0;
      currentGuess = [];
    }
  });
}

// ── Animazione flip ──
function revealRow(row, guess, result, onDone) {
  const DELAY = 300; // ms tra un tile e l'altro
  result.forEach((state, col) => {
    const tile = tileEls[row][col];
    setTimeout(() => {
      // imposta il colore prima del flip (visibile nella seconda metà)
      const colorMap = { correct: 'var(--green)', present: 'var(--yellow)', absent: 'var(--gray)' };
      tile.style.setProperty('--flip-color', colorMap[state]);
      tile.classList.remove('filled');
      tile.classList.add('reveal');
      // dopo l'animazione, aggiungi la classe stabile
      tile.addEventListener('animationend', () => {
        tile.classList.remove('reveal');
        tile.classList.add(state);
      }, { once: true });
    }, col * DELAY);
  });
  setTimeout(onDone, WORD_LEN * DELAY + 100);
}

function shakeRow(row) {
  const rowEl = document.getElementById('row-' + row);
  rowEl.classList.add('shake');
  rowEl.addEventListener('animationend', () => rowEl.classList.remove('shake'), { once: true });
}

function bounceRow(row) {
  tileEls[row].forEach((tile, i) => {
    setTimeout(() => tile.classList.add('bounce'), i * 80);
  });
}

// ── Tastiera colori ──
// Priorità: correct > present > absent
const STATE_PRIORITY = { correct: 3, present: 2, absent: 1 };
function updateKeyboard(guess, result) {
  guess.split('').forEach((letter, i) => {
    const btn = keyEls[letter];
    if (!btn) return;
    const currentPrio = STATE_PRIORITY[btn.dataset.state] || 0;
    const newPrio = STATE_PRIORITY[result[i]];
    if (newPrio > currentPrio) {
      // Rimuovi classi precedenti
      btn.classList.remove('correct', 'present', 'absent');
      btn.classList.add(result[i]);
      btn.dataset.state = result[i];
    }
  });
}

// ── Toast ──
let toastTimer;
function showToast(msg, duration = 1600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ── Risultato finale ──
function showResult(won, tries) {
  const panel = document.getElementById('result-panel');
  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const msg   = document.getElementById('result-msg');
  

  if (won) {
    const messages = [
      'Al primo colpo? A paracula hai barato 🌟',
      'Due tentativi, aura! 🌟',
      'Tre tentativi, poteva piove! 🤍',
      'Quattro tentativi — così si fa 🤍',
      'Cinque tentativi — quasi perdevi eh ✨',
      'Al sesto! Che culo! 🎉',
    ];
    emoji.textContent = '🎉';
    title.textContent = 'Hai indovinato!';
    msg.textContent = messages[tries - 1] + ' Torna alla mappa per la tua prossima cifra!';
  } else {
    emoji.textContent = '🤍';
    title.textContent = 'CHE BUSTA !';
    msg.textContent = 'Non preoccuparti amore, puoi riprovare!';
  }

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function markDone() {
  localStorage.setItem('game2_done', 'true');
  window.location.href = 'index.html';
}

function resetGame() {
  currentRow = 0; currentCol = 0;
  currentGuess = []; gameOver = false;
  document.getElementById('result-panel').classList.remove('show');
  buildBoard();
  buildKeyboard();
}

// ── Init ──
buildBoard();
buildKeyboard();

if (localStorage.getItem('game2_done') === 'true') {
  // già completato, mostra comunque il gioco ma con bottone torna
}
</script>
</body>
</html>
