<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gioco 4 — Quiz su di Noi 🤍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lilla-deep: #7B5EA7;
      --lilla-mid: #9B7EC8;
      --lilla-light: #C3A8E0;
      --lilla-pale: #EDE0F7;
      --lilla-bg: #F5EEFF;
      --white: #FFFFFF;
      --text-dark: #3D2B5E;
      --text-mid: #6B4E8A;
      --shadow: rgba(123, 94, 167, 0.2);
      --correct: #27ae60;
      --wrong: #c0392b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--lilla-bg); min-height: 100vh; }

    nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.2rem 2rem; background: var(--white);
      box-shadow: 0 2px 16px var(--shadow);
    }
    nav a { font-size: 0.85rem; color: var(--lilla-mid); text-decoration: none; font-weight: 600; }
    nav a:hover { color: var(--lilla-deep); }
    .nav-badge {
      background: linear-gradient(135deg, var(--lilla-mid), var(--lilla-deep));
      color: white; border-radius: 999px; padding: 0.2rem 0.8rem;
      font-size: 0.75rem; font-weight: 700;
    }

    .game-header { text-align: center; padding: 2.5rem 1.5rem 1.5rem; }
    .game-header .eyebrow { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--lilla-mid); margin-bottom: 0.5rem; }
    .game-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,5vw,2.8rem); color: var(--text-dark); }
    .game-header h1 em { font-style: italic; color: var(--lilla-deep); }
    .game-header p { margin-top: 0.6rem; font-size: 0.95rem; color: var(--text-mid); line-height: 1.6; }

    .quiz-wrap { max-width: 560px; margin: 0 auto 3rem; padding: 0 1.5rem; }

    /* Progress domande */
    .q-progress {
      display: flex; gap: 6px; margin-bottom: 1.2rem; justify-content: center;
    }
    .q-dot {
      width: 28px; height: 6px; border-radius: 999px;
      background: var(--lilla-light); transition: background 0.3s;
    }
    .q-dot.done { background: var(--lilla-deep); }
    .q-dot.current { background: var(--lilla-mid); }

    /* Card domanda */
    .q-card {
      background: var(--white); border-radius: 20px; padding: 2rem;
      box-shadow: 0 4px 28px var(--shadow); border: 2px solid var(--lilla-pale);
      transition: opacity 0.3s;
    }
    .q-number {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--lilla-light); margin-bottom: 0.6rem;
    }
    .q-text {
      font-family: 'Playfair Display', serif; font-size: 1.25rem;
      color: var(--text-dark); line-height: 1.4; margin-bottom: 1.6rem;
    }

    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
    }
    .option-btn {
      background: var(--lilla-bg); border: 2px solid var(--lilla-pale);
      border-radius: 12px; padding: 0.85rem 1rem;
      font-family: 'Nunito', sans-serif; font-size: 0.92rem; font-weight: 600;
      color: var(--text-dark); cursor: pointer; text-align: left;
      transition: all 0.2s; line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) {
      background: var(--lilla-pale); border-color: var(--lilla-mid);
      transform: translateY(-1px);
    }
    .option-btn.correct {
      background: #eafaf1; border-color: var(--correct);
      color: var(--correct);
    }
    .option-btn.wrong {
      background: #fdf0ee; border-color: var(--wrong);
      color: var(--wrong);
    }
    .option-btn:disabled { cursor: default; }

    /* Feedback */
    .feedback-row {
      margin-top: 1rem; min-height: 1.8rem; text-align: center;
      font-size: 0.92rem; font-weight: 700; transition: opacity 0.3s;
    }
    .feedback-row.correct { color: var(--correct); }
    .feedback-row.wrong { color: var(--wrong); }

    /* Spiegazione */
    .explanation {
      display: none; margin-top: 0.8rem; padding: 0.8rem 1rem;
      background: var(--lilla-pale); border-radius: 10px;
      font-size: 0.85rem; color: var(--text-mid); line-height: 1.5;
    }
    .explanation.show { display: block; }

    .btn-next {
      display: none; margin-top: 1.2rem; width: 100%;
      background: linear-gradient(135deg, var(--lilla-mid), var(--lilla-deep));
      color: white; border: none; border-radius: 999px;
      padding: 0.9rem; font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(123,94,167,0.35);
    }
    .btn-next.show { display: block; }
    .btn-next:hover { transform: translateY(-2px); }

    /* Score finale */
    .result-box {
      background: var(--white); border-radius: 20px; padding: 2.5rem 2rem;
      box-shadow: 0 4px 28px var(--shadow); text-align: center; display: none;
      border: 2px solid var(--lilla-pale);
    }
    .result-box.show { display: block; }
    .result-emoji { font-size: 3rem; margin-bottom: 0.8rem; }
    .result-box h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text-dark); margin-bottom: 0.5rem; }
    .result-box p { font-size: 0.92rem; color: var(--text-mid); line-height: 1.6; margin-bottom: 0.8rem; }
    .score-big {
      font-family: 'Playfair Display', serif; font-size: 2.5rem;
      color: var(--lilla-deep); font-weight: 700;
    }
    .btn-complete {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: linear-gradient(135deg, var(--lilla-mid), var(--lilla-deep));
      color: white; border: none; border-radius: 999px;
      padding: 0.85rem 2rem; font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(123,94,167,0.35);
    }
    .btn-complete:hover { transform: translateY(-2px); }

    @media(max-width: 420px) {
      .options-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">← Torna alla mappa</a>
    <span style="flex:1"></span>
    <span class="nav-badge">💬 Gioco 4 di 4</span>
  </nav>

  <div class="game-header">
    <p class="eyebrow">✦ Gioco 4 ✦</p>
    <h1>Quiz<br><em>su di ME</em></h1>
    <p>Quanto mi conosci? 🤍<br>8 domande per mettere alla prova la tua memoria.</p>
  </div>

  <div class="quiz-wrap">
    <div id="quizArea">
      <div class="q-progress" id="qProgress"></div>
      <div class="q-card" id="qCard">
        <p class="q-number" id="qNumber"></p>
        <p class="q-text" id="qText"></p>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-row" id="feedback"></div>
        <div class="explanation" id="explanation"></div>
        <button class="btn-next" id="btnNext" onclick="nextQuestion()">Prossima domanda →</button>
      </div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-emoji" id="resultEmoji"></div>
      <h2 id="resultTitle"></h2>
      <div class="score-big" id="scoreDisplay"></div>
      <p id="resultMsg"></p>
      <button class="btn-complete" onclick="markDone()">Torna alla mappa 🤍</button>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════════════
    //  PERSONALIZZA LE DOMANDE QUI SOTTO!
    //  Ogni domanda ha:
    //   - q: testo della domanda
    //   - opts: array di 4 opzioni
    //   - correct: indice (0-3) della risposta giusta
    //   - explain: spiegazione mostrata dopo la risposta
    // ══════════════════════════════════════════════════════════════════════
    const QUESTIONS = [
      {
        q: "Qual'è il mio colore preferito?",
        opts: ["Nero", "Rosso", "Verde", "Blu"],
        correct: 0, // ← cambia con l'indice giusto (0, 1, 2 o 3)
        explain: "Prima era il rosso ma ultimamente è il nero "
      },
      {
        q: "Qual è a parer mio il miglior film mai visto insieme?",
        opts: ["Damsel", "Obsession", "Toy Story 5", "Super Mario 2"],
        correct: 1,
        explain: "Dai su era facile!"
      },
      {
        q: "Che tipo di birra non mi piace?",
        opts: ["Tennent's", "Ichnusa", "Peroni", "Heineken"],
        correct: 2,
        explain: "Sa di piscio"
      },
      {
        q: "Che segno zodiacale sono?",
        opts: ["Scorpione", "Acquario", "Sagittario", "Pesci"],
        correct: 0,
        explain: "Fun Fact: fossi nato il giorno dopo sarei stato sagittario"
      },
      {
        q: "Al nostro primo appuntamento, a chi ho ho dato 2 euro?",
        opts: ["Arianna", "Carola", "Giulia", "Clarissa"],
        correct: 3,
        explain: "Poveri i miei 2 euro 🥲"
      },
      {
        q: "Prima dell'attraversaspecchi quale saga ho letto?",
        opts: ["Grishaverse", "Percy Jackson", "Red Rising", "Fourth Wing"],
        correct: 0,
        explain: "M E R A V I G L I O S A"
      },
      {
        q: "Che facoltà ho scelto all'università?",
        opts: ["Sistemi e Reti", "Ingegneria Informatica", "Elettronica", "Informatica"],
        correct: 3,
        explain: "Palese finirò fuori corso ma vabbè"
      },
      {
        q: "Qual'è stato il tuo primo messaggio su ig?",
        opts: ["oii grazie per stasera", "Mi sono diveritita stasera", "Ei comunque grazie per la compagnia di stasera", "Coglione scoppia"],
        correct: 2,
        explain: "Già mi avevi conquistato 🤍"
      },
    ];
    // ══════════════════════════════════════════════════════════════════════

    let current = 0;
    let score = 0;
    let answered = false;

    function init() {
      renderProgress();
      renderQuestion();
    }

    function renderProgress() {
      const bar = document.getElementById('qProgress');
      bar.innerHTML = '';
      QUESTIONS.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'q-dot' + (i < current ? ' done' : i === current ? ' current' : '');
        bar.appendChild(dot);
      });
    }

    function renderQuestion() {
      const q = QUESTIONS[current];
      answered = false;
      document.getElementById('qNumber').textContent = `Domanda ${current + 1} di ${QUESTIONS.length}`;
      document.getElementById('qText').textContent = q.q;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback-row';
      document.getElementById('explanation').className = 'explanation';
      document.getElementById('explanation').textContent = '';
      document.getElementById('btnNext').className = 'btn-next';

      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(i, btn);
        grid.appendChild(btn);
      });
    }

    function selectAnswer(idx, btn) {
      if (answered) return;
      answered = true;
      const q = QUESTIONS[current];
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);

      if (idx === q.correct) {
        score++;
        btn.classList.add('correct');
        document.getElementById('feedback').textContent = '✓ Esatto! Bravissima! 🌟';
        document.getElementById('feedback').className = 'feedback-row correct';
      } else {
        btn.classList.add('wrong');
        allBtns[q.correct].classList.add('correct');
        document.getElementById('feedback').textContent = '✗ Aia male male eh amore';
        document.getElementById('feedback').className = 'feedback-row wrong';
      }

      document.getElementById('explanation').textContent = q.explain;
      document.getElementById('explanation').className = 'explanation show';

      const isLast = current === QUESTIONS.length - 1;
      const nextBtn = document.getElementById('btnNext');
      nextBtn.textContent = isLast ? 'Vedi il risultato 🤍' : 'Prossima domanda →';
      nextBtn.className = 'btn-next show';
    }

    function nextQuestion() {
      current++;
      if (current >= QUESTIONS.length) {
        showResult();
      } else {
        renderProgress();
        renderQuestion();
      }
    }

    function showResult() {
      document.getElementById('quizArea').style.display = 'none';
      const box = document.getElementById('resultBox');
      box.classList.add('show');

      const pct = Math.round(score / QUESTIONS.length * 100);
      document.getElementById('scoreDisplay').textContent = `${score}/${QUESTIONS.length}`;

      let emoji, title, msg;
      if (score === QUESTIONS.length) {
        emoji = '🏆'; title = 'Perfetto!';
        msg = 'Mi conosci alla perfezione — ti amo tantissimo! 🤍';
      } else if (pct >= 75) {
        emoji = '⭐'; title = 'Ottimo risultato!';
        msg = 'Mi conosci bene — mi fai sentire speciale 🤍';
      } else if (pct >= 50) {
        emoji = '🤍'; title = 'Bel Tentativo!';
        msg = 'Poteva andare peggio amore 🤍';
      } else {
        emoji = '🌸'; title = 'C\'è ancora da imparare!';
        msg = 'Non importa — l\'importante è stare insieme! 🤍';
      }

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultMsg').textContent = msg;
      localStorage.setItem('game4_done', 'true');
    }

    function markDone() {
      localStorage.setItem('game4_done', 'true');
      window.location.href = 'index.html';
    }

    init();
    if (localStorage.getItem('game4_done') === 'true') {
      // Già completato: mostra comunque il quiz
    }
  </script>
</body>
</html>
